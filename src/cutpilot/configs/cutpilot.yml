# CutPilot — NeMo Agent Toolkit workflow.
#
# Three NIM services, all OpenAI-compatible /v1 endpoints:
#   - Text reasoning (Editor):  nvidia/nemotron-3-nano
#   - Vision-language (Scout):  nvidia/nemotron-nano-12b-v2-vl
#   - Whisper-Large (ASR):      NOT here — NAT's llms: block is for chat models
#                               only. Whisper is called from `pipeline.py` via
#                               `clients/whisper.py` (OpenAI audio API).
#
# Run:
#   nat run   --config_file=src/cutpilot/configs/cutpilot.yml --input <source.mp4>
#   nat serve --config_file=src/cutpilot/configs/cutpilot.yml    # FastAPI over HTTP
#
# Endpoints and model names come from `.env` via `settings.py`. Dev endpoints
# currently rotate through Cloudflare tunnels — update `.env` when they change.

general:
  telemetry:
    logging:
      console:
        _type: console
        level: info

llms:
  # Text reasoning + tool calling. Editor uses this.
  nemotron_text:
    _type: nim
    model_name: ${NIM_TEXT_MODEL:-nvidia/nemotron-3-nano}
    base_url: ${NIM_TEXT_BASE_URL:-http://0.0.0.0:8000/v1}
    api_key: ${NVIDIA_API_KEY:-dummy}
    temperature: 0.0

  # Vision-language for video/image analysis. Scout uses this. The NIM accepts
  # `video_url` content parts and per-request `media_io_kwargs` (e.g.
  # {"video": {"fps": 2, "num_frames": 128}}) — pass those in the Scout call
  # site, not here in the provider config.
  nemotron_vl:
    _type: nim
    model_name: ${NIM_VL_MODEL:-nvidia/nemotron-nano-12b-v2-vl}
    base_url: ${NIM_VL_BASE_URL:-http://0.0.0.0:9000/v1}
    api_key: ${NVIDIA_API_KEY:-dummy}
    temperature: 0.2

functions:
  # Scout — @register_function returning CandidatesResult. No tools.
  scout:
    _type: cutpilot_scout
    llm: nemotron_vl

  # Editor tools — registered Python functions; NAT derives schemas from signatures.
  cut:
    _type: cutpilot_cut
  crop_9_16:
    _type: cutpilot_crop_9_16
  burn_captions:
    _type: cutpilot_burn_captions
  transcript_window:
    _type: cutpilot_transcript_window

  # Editor — NAT's native tool_calling_agent. Only component with write access.
  editor:
    _type: tool_calling_agent
    llm_name: nemotron_text
    tool_names:
      - cut
      - crop_9_16
      - burn_captions
      - transcript_window
    description: >
      Pick the top 3 Scout candidates by composite rubric score, validate timestamps
      against the transcript, then call tools to cut, crop to 9:16, and burn captions.
      Emit exactly 3 non-overlapping clips.

# Scout → Editor in order.
workflow:
  _type: sequential_executor
  tool_list:
    - scout
    - editor
